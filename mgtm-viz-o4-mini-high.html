<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MGRM Interactive Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    .slider { margin: 10px 0; }
    label { display: block; }
    .chart-container { position: relative; height: 300px; width: 100%; }
  </style>
</head>
<body>
  <h2>Graded Response Model (Single Item) Demo</h2>
  <p>Drag the sliders to see how the category probabilities change.</p>

  <div class="slider">
    <label>
      Discrimination <strong>a</strong> = <span id="aVal">1.0</span>
    </label>
    <input id="a" type="range" min="0.1" max="5" value="1" step="0.1">
  </div>
  <div class="slider">
    <label>
      Cutpoint <strong>b₁</strong> = <span id="b1Val">-1.0</span>
    </label>
    <input id="b1" type="range" min="-4" max="4" value="-1" step="0.1">
  </div>
  <div class="slider">
    <label>
      Cutpoint <strong>b₂</strong> = <span id="b2Val">0.0</span>
    </label>
    <input id="b2" type="range" min="-4" max="4" value="0" step="0.1">
  </div>
  <div class="slider">
    <label>
      Cutpoint <strong>b₃</strong> = <span id="b3Val">1.0</span>
    </label>
    <input id="b3" type="range" min="-4" max="4" value="1" step="0.1">
  </div>
  <div class="slider">
    <label>
      Trait <strong>θ</strong> = <span id="thetaVal">0.0</span>
    </label>
    <input id="theta" type="range" min="-4" max="4" value="0" step="0.1">
  </div>

  <div class="chart-container">
    <canvas id="probChart"></canvas>
  </div>

  <script>
    // helper: logistic function
    function logistic(x) {
      return 1 / (1 + Math.exp(-x));
    }

    // compute category probabilities for a single item GRM
    // bs = [b1,b2,b3], gives 4 categories (0,1,2,3)
    function computeProbs(theta, a, bs) {
      const m = bs.length;
      // cumulative probabilities P*(k) = P(Y >= k)
      const Pstar = [1];
      for (let k = 0; k < m; k++) {
        Pstar.push(logistic(a * (theta - bs[k])));
      }
      Pstar.push(0);
      // P(Y = k) = P*(k) - P*(k+1)
      const probs = [];
      for (let k = 0; k <= m; k++) {
        probs.push(Pstar[k] - Pstar[k+1]);
      }
      return probs;
    }

    // initialize chart
    const ctx = document.getElementById('probChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Cat 0','Cat 1','Cat 2','Cat 3'],
        datasets: [{
          label: 'P(response=k)',
          data: [0.25,0.25,0.25,0.25],
          backgroundColor: ['rgba(75,192,192,0.5)'],
          borderColor: ['rgba(75,192,192,1)'],
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true, max: 1 }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(3) } }
        }
      }
    });

    // cache DOM
    const sliders = ['a','b1','b2','b3','theta'];
    const values = { a:1, b1:-1, b2:0, b3:1, theta:0 };
    sliders.forEach(id => {
      const s = document.getElementById(id);
      const vSpan = document.getElementById(id + 'Val');
      s.addEventListener('input', () => {
        values[id] = parseFloat(s.value);
        vSpan.textContent = values[id].toFixed(1);
        updateChart();
      });
    });

    function updateChart() {
      const {a,b1,b2,b3,theta} = values;
      const probs = computeProbs(theta, a, [b1,b2,b3]);
      chart.data.datasets[0].data = probs;
      chart.update();
    }

    // initial draw
    updateChart();
  </script>
</body>
</html>
