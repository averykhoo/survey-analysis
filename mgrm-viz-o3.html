<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive GRM Visualizer</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:40px;background:#fafafa;color:#333}
    h1{font-size:24px;margin-bottom:20px}
    .controls{display:flex;flex-wrap:wrap;gap:20px;max-width:600px}
    .control{flex:1 1 250px}
    label{display:block;margin-bottom:4px;font-weight:600}
    input[type=range]{width:100%}
    #chartContainer{max-width:600px;margin-top:30px}
    .value{font-family:monospace}
  </style>
</head>
<body>
  <h1>Interactive Graded Response Model Demo</h1>
  <p>Move the sliders to see how <strong>θ (ability)</strong>, <strong>a (discrimination)</strong>, and the three <strong>cut‑points c<sub>1</sub>, c<sub>2</sub>, c<sub>3</sub></strong> change the probability of picking each response category.</p>

  <div class="controls">
    <div class="control">
      <label>Theta θ: <span class="value" id="thetaVal">0</span></label>
      <input id="theta" type="range" min="-4" max="4" step="0.1" value="0">
    </div>
    <div class="control">
      <label>Discrimination a: <span class="value" id="aVal">1</span></label>
      <input id="a" type="range" min="0.2" max="4" step="0.1" value="1">
    </div>
    <div class="control">
      <label>Cut‑point c1: <span class="value" id="c1Val">-1</span></label>
      <input id="c1" type="range" min="-4" max="4" step="0.1" value="-1">
    </div>
    <div class="control">
      <label>Cut‑point c2: <span class="value" id="c2Val">0</span></label>
      <input id="c2" type="range" min="-4" max="4" step="0.1" value="0">
    </div>
    <div class="control">
      <label>Cut‑point c3: <span class="value" id="c3Val">1</span></label>
      <input id="c3" type="range" min="-4" max="4" step="0.1" value="1">
    </div>
  </div>

  <div id="chartContainer">
    <canvas id="chart" width="600" height="400"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const sliders = ['theta','a','c1','c2','c3'].reduce((obj,id)=>{obj[id]=document.getElementById(id);return obj;}, {});
    const labels = {theta:'thetaVal',a:'aVal',c1:'c1Val',c2:'c2Val',c3:'c3Val'};
    Object.keys(labels).forEach(id=>{document.getElementById(labels[id]).textContent=sliders[id].value;});

    function logistic(x){ return 1/(1+Math.exp(-x)); }

    function getProbs(theta,a,c1,c2,c3){
      const cuts=[-Infinity,c1,c2,c3,Infinity];
      const probs=[];
      for(let k=0;k<4;k++){
        const pk = logistic(a*(theta - cuts[k])) - logistic(a*(theta - cuts[k+1]));
        probs.push(Math.max(pk,0));
      }
      return probs;
    }

    const ctx=document.getElementById('chart').getContext('2d');
    const chart=new Chart(ctx,{
      type:'bar',
      data:{
        labels:['Cat 0','Cat 1','Cat 2','Cat 3'],
        datasets:[{label:'Probability',data:[0.25,0.25,0.25,0.25]}]
      },
      options:{
        scales:{
          y:{beginAtZero:true,max:1,ticks:{callback:v=>v.toFixed(1)}}
        }
      }
    });

    function enforceCutOrder(){
      const c1=parseFloat(sliders.c1.value);
      const c2=parseFloat(sliders.c2.value);
      const c3=parseFloat(sliders.c3.value);
      if(c1>=c2){sliders.c2.value=(c1+0.1).toFixed(1);}
      if(c2>=c3){sliders.c3.value=(parseFloat(sliders.c2.value)+0.1).toFixed(1);}
    }

    function update(){
      enforceCutOrder();
      Object.keys(labels).forEach(id=>{document.getElementById(labels[id]).textContent=parseFloat(sliders[id].value).toFixed(1);});
      const theta=parseFloat(sliders.theta.value);
      const a=parseFloat(sliders.a.value);
      const c1=parseFloat(sliders.c1.value);
      const c2=parseFloat(sliders.c2.value);
      const c3=parseFloat(sliders.c3.value);
      const probs=getProbs(theta,a,c1,c2,c3);
      chart.data.datasets[0].data=probs;
      chart.update();
    }

    Object.values(sliders).forEach(slider=>slider.addEventListener('input',update));

    update();
  </script>
</body>
</html>
